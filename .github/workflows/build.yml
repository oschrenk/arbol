name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest # x86_64-linux
          - runner: ubuntu-24.04-arm # aarch64-linux
          - runner: macos-latest # aarch64-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: oschrenk
          # Create at https://app.cachix.org/personal-auth-tokens,
          # add as the CACHIX_AUTH_TOKEN repository secret.
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      # Paths built here are pushed to the cache automatically by cachix-action.
      - run: nix build .#arbol --print-build-logs
