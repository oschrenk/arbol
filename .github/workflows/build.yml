name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest # x86_64-linux
          - runner: ubuntu-24.04-arm # aarch64-linux
          - runner: macos-latest # aarch64-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: oschrenk
          # Create at https://app.cachix.org/personal-auth-tokens,
          # add as the CACHIX_AUTH_TOKEN repository secret.
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      # Paths built here are pushed to the cache automatically by cachix-action.
      - run: nix build .#arbol --print-build-logs
